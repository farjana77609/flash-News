<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The News App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous" />
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <div class="news-app-wrapper">
        <div class="preloader" id="preloader">
            <img src="./assets/news-logo.svg" alt="NewsFlash Logo">
        </div>
      <a href="#" class="move-top-btn  justify-content-center align--items-center p-2 border border-primary  bg-white rounded-circle"><img src="./assets/arrow-up.png" height="20" width="20" alt="arrow-up"></a>
    
    <nav>
        <div class="main-nav container justify-content-md-between justify-content-around flex py-3">

            <button class="navbar-toggler d-md-none d-inline toggle-bar align-self-end pb-2" type="button"
                data-bs-toggle="offcanvas" data-bs-target="#navbarOffcanvasLg" aria-controls="navbarOffcanvasLg">
                <img id="menu-icon" src="./assets/hamburger.svg" alt="Menu" height="30" width="30">
            </button>
            <a href="#" onclick="reload()" class="company-logo d-md-inline-block d-none">
                <img src="./assets/news-logo.svg" alt="NewsFlash Logo" />
            </a>

            <div class="offcanvas offcanvas-start" tabindex="-1" id="navbarOffcanvasLg"
                aria-labelledby="navbarOffcanvasLgLabel">
                <div class="offcanvas-header">
                    <a href="#" target="_blank" class="brand-logo"><img src="./assets/news-logo.svg"
                            alt="brand-logo"></a>
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                </div>
                <div class="offcanvas-body">
                    <ul class="navbar-nav d-flex">

                        <li class="p-2  hover-link nav-item" id="education" onclick="onNavItemClick('education')">
                            Education</li>
                        <li class="p-2  hover-link nav-item" id="crime" onclick="onNavItemClick('crime')">crime</li>
                        <li class="p-2 hover-link nav-item" id="ipl" onclick="onNavItemClick('ipl')">IPL</li>
                        <li class="p-2 hover-link nav-item" id="finance" onclick="onNavItemClick('finance')">Finance
                        </li>
                        <li class="p-2 hover-link nav-item" id="politics" onclick="onNavItemClick('politics')">Politics
                        </li>
                        </li>
                        <li class="p-2 hover-link nav-item" id="entertainment" onclick="onNavItemClick('entertainment')">entertainment</li>
                    </ul>
                </div>
            </div>

            <div class="nav-links ">
                <ul class="flex d-lg-flex d-none  ">

                    <li class="p-2  hover-link nav-item" id="education" onclick="onNavItemClick('education')">
                        Education</li>
                    <li class="p-2  hover-link nav-item" id="crime" onclick="onNavItemClick('crime')">crime</li>
                    <li class="p-2 hover-link nav-item" id="ipl" onclick="onNavItemClick('ipl')">IPL</li>
                    <li class="p-2 hover-link nav-item" id="finance" onclick="onNavItemClick('finance')">Finance
                    </li>
                    <li class="p-2 hover-link nav-item" id="politics" onclick="onNavItemClick('politics')">Politics
                    </li>
                    </li>
                    <li class="p-2 hover-link nav-item" id="entertainment" onclick="onNavItemClick('entertainment')">entertainment</li>
                </ul>

                <ul class="flex d-md-flex d-none d-lg-none align--items-center">

                    <li class="p-2  hover-link nav-item" id="education" onclick="onNavItemClick('education')">
                        Education</li>
                    <li class="p-2 hover-link nav-item" id="ipl" onclick="onNavItemClick('ipl')">IPL</li>
                    <li class="p-2 hover-link nav-item" id="finance" onclick="onNavItemClick('finance')">Finance
                    </li>
                </ul>
            </div>
            <div class="search-bar flex">
                <input id="search-text" type="text" class="news-input" placeholder="e.g. Science">
                <button id="search-button" class="search-button">Search</button>
            </div>
        </div>
    </nav>


    <main style="background-color: antiquewhite;" class="d-flex justify-content-center ">
        <div class="cards-container container flex flex-wrap row justify-content-center gap-4" id="cards-container">

        </div>
    </main>

    <template id="template-news-card">
        <div class="my-card  col-md-3 bg-primary">
            <div class="my-card-header">
                <img src="https://via.placeholder.com/400x200" alt="news-image" id="news-img">
            </div>
            <div class="card-content d-flex flex-column position-relative">
                <h3 id="news-title">This is the Title</h3>
                <h6 class="news-source" id="news-source">End Gadget 26/08/2023</h6>
                <p class="news-desc " id="news-desc">Lorem, ipsum dolor sit amet consectetur adipisicing elit. Recusandae
                    saepe quis voluptatum quisquam vitae doloremque facilis molestias quae ratione cumque!
                </p>
                <a class="learn-more-btn position-absolute px-1 py-2   w-50 rounded text-center text-white" href="#">Learn More..</a>
            </div>
        </div>
    </template>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
